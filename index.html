<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>International Space Station Live Radar</title>
    <link rel="stylesheet" href="https://unpkg.com" />
    <script src="https://unpkg.com"></script>
    <style>
        body { margin: 0; padding: 0; font-family: Arial, sans-serif; background: #0b0f19; color: #fff; text-align: center; }
        h1 { margin: 15px 0 5px 0; color: #4facfe; font-size: 24px; text-transform: uppercase; letter-spacing: 2px; }
        #info { margin-bottom: 15px; font-size: 16px; color: #00f2fe; font-weight: bold; }
        #map { height: 75vh; width: 90%; margin: 0 auto; border-radius: 12px; border: 2px solid #4facfe; box-shadow: 0 0 20px rgba(79, 172, 254, 0.5); }
    </style>
</head>
<body>

    <h1>🛰️ ISS REAL-TIME RADAR</h1>
    <div id="info">Connecting to Space Satellites...</div>
    <div id="map"></div>

    <script>
        var startCoords =;
        const map = L.map('map').setView(startCoords, 2);
        
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '&copy; OpenStreetMap contributors'
        }).addTo(map);

        var sizeSize =;
        var anchorSize =;
        
        const issIcon = L.icon({
            iconUrl: 'https://wikimedia.org',
            iconSize: sizeSize,
            iconAnchor: anchorSize
        });
        
        const marker = L.marker(startCoords, {icon: issIcon}).addTo(map);

        async function getISSLocation() {
            try {
                // ĐÃ ĐỔI: Dùng cổng API dự phòng của Open Notify cực kỳ ổn định
                const response = await fetch('https://opennotify.org');
                const data = await response.json();
                
                const lat = Number(data.iss_position.latitude);
                const lng = Number(data.iss_position.longitude);

                var newCoords = [lat, lng];
                marker.setLatLng(newCoords);
                map.panTo(newCoords);

                document.getElementById('info').innerHTML = 
                    "Latitude: " + lat.toFixed(4) + " | Longitude: " + lng.toFixed(4) + " | Status: Tracking Live";
            } catch (error) {
                document.getElementById('info').innerText = "API Connection Error!";
                console.error(error);
            }
        }

        setInterval(getISSLocation, 2000);
        getISSLocation();
    </script>
</body>
</html>
