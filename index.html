<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Radar Theo Doi Tram Vu Tru Quoc Te ISS</title>
    <link rel="stylesheet" href="https://unpkg.com" />
    <script src="https://unpkg.com"></script>
    <style>
        body { margin: 0; padding: 0; font-family: Arial, sans-serif; background: #0b0f19; color: #fff; text-align: center; }
        h1 { margin: 15px 0 5px 0; color: #4facfe; font-size: 24px; text-transform: uppercase; letter-spacing: 2px; }
        #info { margin-bottom: 15px; font-size: 16px; color: #00f2fe; font-weight: bold; }
        #map { height: 75vh; width: 90%; margin: 0 auto; border-radius: 12px; border: 2px solid #4facfe; box-shadow: 0 0 20px rgba(79, 172, 254, 0.5); }
    </style>
</head>
<body>

    <h1>🛰️ ISS REAL-TIME RADAR</h1>
    <div id="info">Connecting to NASA Satellites...</div>
    <div id="map"></div>

    <script>
        const map = L.map('map').setView([0, 0], 2);
        
        L.tileLayer('https://{s}://{z}/{x}/{y}{r}.png', {
            attribution: '&copy; OpenStreetMap'
        }).addTo(map);

        const issIcon = L.icon({
            iconUrl: 'https://wikimedia.org',
            iconSize: [50, 30],
            iconAnchor: [25, 15]
        });
        
        const marker = L.marker([0, 0], {icon: issIcon}).addTo(map);

        async function getISSLocation() {
            try {
                const response = await fetch('https://api.wheretheiss.at/v1/satellites/25544');
                const data = await response.json();
                const lat = data.latitude;
                const lng = data.longitude;
                const vel = data.velocity;
                const alt = data.altitude;

                marker.setLatLng([lat, lng]);
                map.panTo([lat, lng]);

                document.getElementById('info').innerHTML = 
                    "Latitude: " + lat.toFixed(4) + " | Longitude: " + lng.toFixed(4) + " | Speed: " + Math.round(vel) + " km/h | Altitude: " + alt.toFixed(1) + " km";
            } catch (error) {
                document.getElementById('info').innerText = "API Connection Error!";
            }
        }

        setInterval(getISSLocation, 2000);
        getISSLocation();
    </script>
</body>
</html>
