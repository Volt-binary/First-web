<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Radar Theo Dõi Trạm Vũ Trụ Quốc Tế ISS</title>
    <link rel="stylesheet" href="https://unpkg.com" />
    <script src="https://unpkg.com"></script>
    <style>
        body { margin: 0; padding: 0; font-family: Arial, sans-serif; background: #0b0f19; color: #fff; text-align: center; }
        h1 { margin: 15px 0 5px 0; color: #4facfe; font-size: 24px; text-transform: uppercase; letter-spacing: 2px; }
        #info { margin-bottom: 15px; font-size: 16px; color: #00f2fe; font-weight: bold; }
        #map { height: 75vh; width: 90%; margin: 0 auto; border-radius: 12px; border: 2px solid #4facfe; box-shadow: 0 0 20px rgba(79, 172, 254, 0.5); }
    </style>
</head>
<body>

    <h1>🛰️ ISS REAL-TIME RADAR</h1>
    <div id="info">Đang kết nối với vệ tinh NASA...</div>
    <div id="map"></div>

    <script>
        const map = L.map('map').setView([0, 0], 2);
        L.tileLayer('https://{s}://{z}/{x}/{y}{r}.png', {
            attribution: '&copy; OpenStreetMap &copy; CARTO'
        }).addTo(map);

        const issIcon = L.icon({
            iconUrl: 'https://wikimedia.org',
            iconSize:,
            iconAnchor: [25, 15]
        });
        const marker = L.marker([0, 0], {icon: issIcon}).addTo(map);

        async function getISSLocation() {
            try {
                const response = await fetch('https://wheretheiss.at');
                const data = await response.json();
                const { latitude, longitude, velocity, altitude } = data;

                marker.setLatLng([latitude, longitude]);
                map.panTo([latitude, longitude]);

                document.getElementById('info').innerHTML = 
                    `Vĩ độ: ${latitude.toFixed(4)}° | Kinh độ: ${longitude.toFixed(4)}° | Vận tốc: ${Math.round(velocity)} km/h | Độ cao: ${altitude.toFixed(1)} km`;
            } catch (error) {
                document.getElementById('info').innerText = "Lỗi kết nối dữ liệu vũ trụ!";
            }
        }

        setInterval(getISSLocation, 2000);
        getISSLocation();
    </script>
</body>
</html>
