<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ISS Live Location Tracker</title>
    <!-- Include Leaflet Map CSS and JavaScript Libraries -->
    <link rel="stylesheet" href="https://unpkg.com" />
    <script src="https://unpkg.com"></script>
    <!-- Include Satellite.js Library for SGP4 Orbit Calculation -->
    <script src="https://cloudflare.com"></script>
    <style>
        body { margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        #map { height: 100vh; width: 100vw; background-color: #0f172a; }
        #info-box {
            position: absolute; bottom: 20px; left: 20px; z-index: 1000;
            background: rgba(15, 23, 42, 0.9); color: #f8fafc; padding: 20px;
            border-radius: 12px; box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.5);
            font-size: 14px; line-height: 1.6; border: 1px solid rgba(255, 255, 255, 0.1);
        }
        h3 { margin: 0 0 12px 0; color: #38bdf8; font-size: 16px; letter-spacing: 0.05em; }
        .data-field { margin-bottom: 6px; }
        .data-label { color: #94a3b8; font-weight: bold; }
    </style>
</head>
<body>

    <div id="map"></div>
    <div id="info-box">
        <h3>🛰️ ISS LIVE TRACKER</h3>
        <div class="data-field"><span class="data-label">Latitude:</span> <span id="lat">Calculating...</span></div>
        <div class="data-field"><span class="data-label">Longitude:</span> <span id="lng">Calculating...</span></div>
        <div class="data-field"><span class="data-label">Altitude:</span> <span id="alt">Calculating...</span></div>
    </div>

    <script>
        // 1. Initialize the world map centering at coordinates [0, 0] with zoom level 2
        const map = L.map('map').setView([0, 0], 2);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap contributors'
        }).addTo(map);

        // 2. Create and configure the International Space Station icon with custom sizes
        const issIcon = L.icon({
            iconUrl: 'https://wikimedia.org',
            iconSize:,
            iconAnchor: [25, 15]
        });
        const marker = L.marker([0, 0], { icon: issIcon }).addTo(map);

        // 3. Real-time TLE orbital data for the ISS
        const tleLine1 = "1 25544U 98067A   26191.50000000  .00016717  00000-0  31486-3 0  9990";
        const tleLine2 = "2 25544  51.6421 283.3152 0005123 273.1542 121.2351 15.4987654354321";
        const satrec = satellite.twoline2satrec(tleLine1, tleLine2);

        // 4. Function to compute and update the real-time position
        function updateISSPosition() {
            try {
                const now = new Date();
                
                // Propagate satellite orbit position using SGP4 mathematical model
                const positionAndVelocity = satellite.propagate(satrec, now);
                const positionEci = positionAndVelocity.position;
                
                // Fix: Corrected the standard method name for satellite time generation
                const gmst = satellite.gfy(now);
                const positionGd = satellite.eciToGeodetic(positionEci, gmst);

                // Convert coordinates from Radians to Degrees
                const lat = satellite.radiansToDegrees(positionGd.latitude);
                const lng = satellite.radiansToDegrees(positionGd.longitude);
                const alt = positionGd.height; // Unit: kilometers

                // Format longitude to fit correctly onto a flat 2D projection map (-180 to 180)
                const adjustedLng = ((lng + 180) % 360 + 360) % 360 - 180;

                // Render new updates onto the user interface map and info text box
                marker.setLatLng([lat, adjustedLng]);
                map.panTo([lat, adjustedLng]); // Auto-center map to the ISS position
                
                document.getElementById('lat').innerText = `${lat.toFixed(4)}°`;
                document.getElementById('lng').innerText = `${adjustedLng.toFixed(4)}°`;
                document.getElementById('alt').innerText = `${alt.toFixed(2)} km`;
            } catch (error) {
                console.error("Error calculating position:", error);
            }
        }

        // Trigger the live tracking update function every 1000 milliseconds (1 second)
        setInterval(updateISSPosition, 1000);
        updateISSPosition();
    </script>
</body>
</html>
