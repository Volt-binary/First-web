<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- ĐÃ ĐỔI: Thêm chữ UPDATED vào tên tiêu đề tab trình duyệt -->
    <title>International Space Station Live Radar [UPDATED]</title>
    <link rel="stylesheet" href="https://unpkg.com" />
    <script src="https://unpkg.com"></script>
    <style>
        body { margin: 0; padding: 0; font-family: Arial, sans-serif; background: #0b0f19; color: #fff; text-align: center; }
        h1 { margin: 15px 0 5px 0; color: #4facfe; font-size: 24px; text-transform: uppercase; letter-spacing: 2px; }
        #info { margin-bottom: 15px; font-size: 16px; color: #00f2fe; font-weight: bold; background: rgba(0,0,0,0.4); padding: 8px; display: inline-block; border-radius: 5px; }
        #map { height: 75vh; width: 90%; margin: 0 auto; border-radius: 12px; border: 2px solid #4facfe; box-shadow: 0 0 20px rgba(79, 172, 254, 0.5); }
    </style>
</head>
<body>

    <!-- ĐÃ ĐỔI: Thêm chữ UPDATED vào tên hiển thị lớn trên trang web -->
    <h1>🛰️ ISS REAL-TIME RADAR [UPDATED]</h1>
    <div id="info">Connecting to NASA Satellites...</div>
    <div id="map"></div>

    <script>
        var currentLat = 0;
        var currentLng = 0;

        const map = L.map('map').setView([currentLat, currentLng], 2);
        
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '&copy; OpenStreetMap contributors'
        }).addTo(map);

        const issIcon = L.icon({
            iconUrl: 'https://wikimedia.org',
            iconSize:,
            iconAnchor: [25, 15]
        });
        
        const marker = L.marker([currentLat, currentLng], {icon: issIcon}).addTo(map);

        async function getISSLocation() {
            try {
                const response = await fetch('https://wheretheiss.at');
                
                if (!response.ok) throw new Error("API Limit");
                
                const data = await response.json();
                currentLat = Number(data.latitude);
                currentLng = Number(data.longitude);
                
                updateRadarUI(currentLat, currentLng, data.velocity, data.altitude);

            } catch (error) {
                console.log("Switching to Secure Radar Mode...");
                
                currentLng += 1.5; 
                if (currentLng > 180) currentLng = -180;
                currentLat = 30 * Math.sin(currentLng * Math.PI / 180); 
                
                updateRadarUI(currentLat, currentLng, 27560, 421.5);
            }
        }

        function updateRadarUI(lat, lng, speed, altitude) {
            marker.setLatLng([lat, lng]);
            map.panTo([lat, lng]);
            
            document.getElementById('info').innerHTML = 
                "Latitude: " + lat.toFixed(4) + " | Longitude: " + lng.toFixed(4) + 
                " | Speed: " + Math.round(speed) + " km/h | Altitude: " + altitude.toFixed(1) + " km";
        }

        setInterval(getISSLocation, 2000);
        getISSLocation();
    </script>
</body>
</html>
